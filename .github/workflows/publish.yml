name: Release

# Automatically versions and publishes the chainabit package to npm on every
# push to main, using semantic-release. The version bump (major/minor/patch)
# is derived from Conventional Commits since the last release (feat -> minor,
# fix -> patch, "BREAKING CHANGE" -> major), so there is no manual `npm
# version`/tag step — semantic-release creates the git tag, the GitHub
# Release, and the CHANGELOG.md entry itself, then publishes to npm with
# provenance.
#
# The distribution safety check and a smoke test run BEFORE semantic-release,
# so a bad sync from the private source repo (see chainabit-api's
# release-cli.yml, which pushes the built bin/chainabit.cjs to this repo's
# main/development branch) fails loudly here instead of ever reaching npm.
#
# semantic-release's own commit back to main (CHANGELOG.md + package.json)
# includes "[skip ci]", so it does not re-trigger this workflow.
#
# Required repository secrets:
#   NPM_TOKEN     — an npm automation token with publish rights to "chainabit".
#   GITHUB_TOKEN  — provided automatically by Actions; used for the git commit,
#                   tag, and GitHub Release that semantic-release creates.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (analyze + report the next version, do not publish or push)"
        type: boolean
        default: true

permissions:
  contents: write # semantic-release commits CHANGELOG.md/package.json, tags, and creates the GitHub Release
  id-token: write # npm provenance (OIDC)
  issues: write # semantic-release comments on released issues/PRs
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to analyze commits since the last release
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install runtime dependencies
        run: npm install --omit=dev --no-package-lock

      - name: Distribution safety check
        run: node scripts/check-dist-safety.mjs

      - name: Smoke test
        run: |
          node ./bin/chainabit.cjs --help
          node ./bin/chainabit.cjs --version

      - name: Install release tooling
        run: npm install --no-save --package-lock=false semantic-release @semantic-release/changelog @semantic-release/commit-analyzer @semantic-release/git @semantic-release/github @semantic-release/npm @semantic-release/release-notes-generator

      - name: Release (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
