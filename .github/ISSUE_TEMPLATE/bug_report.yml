name: 🐛 Bug report
description: Report a problem with the Chainabit CLI
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! ⚠️ **Never paste tokens, API keys, or secrets** (e.g. `cbt_live_...`) — redact them.
  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: Output of `chainabit --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact command (redact any tokens/secrets).
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include output (prefer `--json`) or a screenshot. Redact secrets.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I am on the latest version (`npm install -g chainabit@latest`)
          required: true
        - label: I have removed all tokens, keys, and secrets from this report
          required: true
